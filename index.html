<style>
/* ============================================================
   DESIGN TOKENS — change --accent to re-theme the whole site
   ============================================================ */
:root{
  --paper:   #FBFBF9;
  --ink:     #16141D;
  --ink-2:   #56525F;
  --accent:  #4B2E83;   /* UW purple — the site's one loud voice */
  --accent-soft: #EEE9F6;
  --gold:    #B7A57A;
  --gold-ink:#83714A;
  --line:    #E5E3DC;
  --card:    #FFFFFF;

  --font-display: "Archivo", sans-serif;
  --font-body: "Instrument Sans", sans-serif;
  --font-mono: "IBM Plex Mono", monospace;

  --maxw: 1080px;
  --pad: clamp(20px, 4vw, 48px);
  --radius: 12px;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:17px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
img{ display:block; max-width:100%; }
a{ color:inherit; }
::selection{ background:var(--accent); color:#fff; }

:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:3px;
  border-radius:2px;
}

/* ---------- shared bits ---------- */
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 var(--pad); }

.mono{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
}

.section{ padding:88px 0 0; }
.section-head{
  display:flex; align-items:baseline; gap:16px;
  border-top:1px solid var(--ink);
  padding-top:14px;
  margin-bottom:44px;
}
.acct-code{
  font-family:var(--font-mono);
  font-size:12px;
  letter-spacing:.12em;
  color:var(--gold-ink);
  white-space:nowrap;
}
.section-title{
  font-family:var(--font-display);
  font-variation-settings:"wdth" 112;
  font-weight:800;
  font-size:clamp(22px, 3vw, 30px);
  letter-spacing:-0.01em;
  text-transform:uppercase;
}

/* ---------- nav ---------- */
.nav{
  position:sticky; top:0; z-index:50;
  background:color-mix(in srgb, var(--paper) 86%, transparent);
  backdrop-filter:blur(10px);
  border-bottom:1px solid transparent;
  transition:border-color .25s ease;
}
.nav.scrolled{ border-bottom-color:var(--line); }
.nav-inner{
  display:flex; align-items:center; justify-content:space-between;
  height:60px;
}
.monogram{
  font-family:var(--font-display);
  font-variation-settings:"wdth" 118;
  font-weight:850;
  font-size:19px;
  text-decoration:none;
  letter-spacing:.02em;
}
.monogram span{ color:var(--accent); }
.nav-links{ display:flex; gap:26px; list-style:none; }
.nav-links a{
  font-family:var(--font-mono);
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  text-decoration:none; color:var(--ink-2);
  transition:color .15s ease;
}
.nav-links a:hover{ color:var(--accent); }
.nav-links .code{ color:var(--gold-ink); margin-right:5px; }
@media (max-width:720px){ .nav-links li:not(:nth-last-child(-n+3)){ display:none; } }

/* ---------- hero ---------- */
.hero{ padding:clamp(64px,10vh,120px) 0 0; }
.hero-eyebrow{
  color:var(--ink-2);
  display:flex; align-items:center; gap:12px;
}
.hero-eyebrow::before{
  content:""; width:34px; height:1px; background:var(--gold); flex:none;
}
.hero-name{

  font-variation-settings:"wdth" 120;
  font-weight:850;
  font-size:clamp(58px, 12.5vw, 148px);

  letter-spacing:-0.02em;
  text-transform:uppercase;
  margin:18px 0 0;
}
.hero-name .last{ color:var(--accent); display:block; }
.hero-tagline{
  max-width:640px;
  margin-top:26px;

}

}
.stat-value{

}

.work-grid{

.reveal.in{ opacity:1; transform:none; }

@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior:auto; }
  .reveal{ opacity:1; transform:none; transition:none; }
  .elev-path{ stroke-dasharray:none !important; stroke-dashoffset:0 !important; animation:none !important; }
  .card, .btn{ transition:none; }
}
</style>
</head>

<body>

<header class="nav" id="nav">
  <div class="wrap nav-inner">
    <a class="monogram" href="#top" id="monogram">M<span>.</span></a>
    <ul class="nav-links">
      <li><a href="#profile"><span class="code">100</span>Profile</a></li>
      <li><a href="#experience"><span class="code">200</span>Experience</a></li>
      <li><a href="#work"><span class="code">300</span>Work</a></li>
      <li><a href="#contact"><span class="code">600</span>Contact</a></li>
    </ul>
  </div>
</header>

<main id="top">

  <!-- HERO -->
  <section class="hero wrap">
    <p class="mono hero-eyebrow" id="hero-eyebrow"></p>
    <h1 class="hero-name" id="hero-name"></h1>
    <p class="hero-tagline" id="hero-tagline"></p>

    <div class="elev" aria-hidden="true">
      <svg viewBox="0 0 800 130" preserveAspectRatio="none">
        <path class="elev-fill" d="M0,100 L60,92 L120,96 L180,78 L240,84 L300,60 L360,68 L430,38 L490,50 L550,22 L610,46 L670,70 L730,88 L800,80 L800,130 L0,130 Z"/>
        <path class="elev-path" id="elev-path" d="M0,100 L60,92 L120,96 L180,78 L240,84 L300,60 L360,68 L430,38 L490,50 L550,22 L610,46 L670,70 L730,88 L800,80"/>
        <g class="elev-ticks" id="elev-ticks"></g>
      </svg>
      <p class="mono elev-caption">Fig. 01 — the road ahead</p>
    </div>

    <div class="stats" id="stats"></div>
    <div class="hero-actions" id="hero-actions"></div>
  </section>

  <!-- 100 · PROFILE -->
  <section class="section wrap" id="profile">
    <div class="section-head reveal">
      <span class="acct-code">№ 100</span>
      <h2 class="section-title">Profile</h2>
    </div>
    <div class="about-grid">
      <figure class="portrait reveal" id="portrait"></figure>
      <div class="about-body reveal">
        <div id="about-paragraphs"></div>
        <div class="currently">
          <h3>Currently</h3>
          <ul id="currently-list"></ul>
        </div>
      </div>
    </div>
  </section>

  <!-- 200 · EXPERIENCE -->
  <section class="section wrap" id="experience">
    <div class="section-head reveal">
      <span class="acct-code">№ 200</span>
      <h2 class="section-title">Experience</h2>
    </div>
    <div class="xp" id="xp-list"></div>
    <p class="mono xp-sub reveal">№ 210 — Education</p>
    <div class="xp" id="edu-list"></div>
    <p class="skills-line reveal" id="skills-line"></p>
  </section>

  <!-- 300 · SELECTED WORK -->
  <section class="section wrap" id="work">
    <div class="section-head reveal">
      <span class="acct-code">№ 300</span>
      <h2 class="section-title">Selected Work</h2>
    </div>
    <div class="work-grid" id="work-grid"></div>
  </section>

  <!-- 400 · GALLERY -->
  <section class="section wrap" id="gallery">
    <div class="section-head reveal">
      <span class="acct-code">№ 400</span>
      <h2 class="section-title">Gallery</h2>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>

  <!-- 500 · OFF THE CLOCK -->
  <section class="section wrap" id="offtheclock">
    <div class="section-head reveal">
      <span class="acct-code">№ 500</span>
      <h2 class="section-title">Off the Clock</h2>
    </div>
    <div class="otc reveal">
      <div>
        <h3 id="otc-heading"></h3>
        <div id="otc-paragraphs"></div>
        <div class="elev-mini" aria-hidden="true">
          <svg viewBox="0 0 400 60" preserveAspectRatio="none" style="width:100%;height:auto;display:block;">
            <path class="elev-path" d="M0,48 L45,40 L90,44 L140,26 L185,34 L235,12 L280,24 L330,38 L400,32"/>
          </svg>
        </div>
      </div>
      <div class="otc-facts" id="otc-facts"></div>
    </div>
  </section>

  <!-- 600 · CONTACT -->
  <section class="section wrap contact" id="contact">
    <div class="section-head reveal">
      <span class="acct-code">№ 600</span>
      <h2 class="section-title">Contact</h2>
    </div>
    <div class="reveal">
      <h2 class="contact-heading" id="contact-heading"></h2>
      <p class="contact-line" id="contact-line"></p>
      <div class="contact-actions" id="contact-actions"></div>
    </div>
  </section>

  <footer class="footer wrap">
    <span class="mono" id="footer-left"></span>
    <span class="mono" id="footer-right"></span>
  </footer>

</main>

<script>
/* ============================================================
   RENDERING — you should not need to edit below this line.
   ============================================================ */
(function(){
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");

  /* --- image slots with graceful placeholders --- */
  function imgSlot(src, alt, container){
    if (!src){ container.appendChild(placeholder("no file set")); return; }
    const img = document.createElement("img");
    img.src = src;
    img.alt = alt || "";
    img.loading = "lazy";
    img.addEventListener("error", () => {
      const ph = placeholder(src.split("/").pop());
      img.replaceWith(ph);
    });
    container.appendChild(img);
  }
  function placeholder(filename){
    const div = document.createElement("div");
    div.className = "ph";
    div.innerHTML =
      '<div class="ph-icon">↑</div>' +
      '<div class="ph-name">' + esc(filename) + '</div>' +
      '<div class="ph-hint">Drop this file into the /images folder</div>';
    return div;
  }

  /* --- nav + hero --- */
  const initials = (SITE.firstName?.[0] || "") + (SITE.lastName?.[0] || "");
  $("monogram").innerHTML = esc(initials || "•") + "<span>.</span>";
  document.title = [SITE.firstName, SITE.lastName].filter(Boolean).join(" ") +
    " — " + (SITE.eyebrow ? SITE.eyebrow.split("·")[0].trim() : "Personal site");

  $("hero-eyebrow").textContent = [SITE.location, SITE.eyebrow].filter(Boolean).join(" · ");
  $("hero-name").innerHTML = esc(SITE.firstName) +
    (SITE.lastName ? '<span class="last">' + esc(SITE.lastName) + "</span>" : "");
  $("hero-tagline").textContent = SITE.tagline || "";

  /* stat strip */
  $("stats").innerHTML = (SITE.stats || []).map(s =>
    '<div class="stat"><div class="stat-value">' + esc(s.value) +
    '</div><div class="stat-label">' + esc(s.label) + "</div></div>"
  ).join("");

  /* hero actions: email, resume, links */
  const actions = [];
  if (SITE.email) actions.push('<a class="btn btn-primary" href="mailto:' + esc(SITE.email) + '">Email me</a>');
  if (SITE.resumeFile) actions.push('<a class="btn btn-ghost" href="' + esc(SITE.resumeFile) + '" download>Resume ↓</a>');
  (SITE.links || []).forEach(l => {
    if (l.url) actions.push('<a class="btn btn-ghost" href="' + esc(l.url) + '" target="_blank" rel="noopener">' + esc(l.label) + " ↗</a>");
  });
  $("hero-actions").innerHTML = actions.join("");

  /* elevation ticks */
  const ticks = [];
  for (let x = 0; x <= 800; x += 40){
    ticks.push('<line class="elev-tick" x1="' + x + '" y1="116" x2="' + x + '" y2="' + (x % 200 === 0 ? 110 : 113) + '"/>');
  }
  $("elev-ticks").innerHTML = ticks.join("");

  /* draw-in animation for the profile line */
  const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const path = $("elev-path");
  if (!prefersReduced && path.getTotalLength){
    const len = path.getTotalLength();
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
    path.style.transition = "stroke-dashoffset 1.8s cubic-bezier(.6,.05,.2,1) .2s";
    requestAnimationFrame(() => requestAnimationFrame(() => { path.style.strokeDashoffset = "0"; }));
  }

  /* --- 100 profile --- */
  imgSlot(SITE.about?.photo, SITE.about?.photoAlt, $("portrait"));
  const tag = document.createElement("figcaption");
  tag.className = "mono portrait-tag";
  tag.textContent = SITE.location || "";
  $("portrait").appendChild(tag);

  $("about-paragraphs").innerHTML = (SITE.about?.paragraphs || [])
    .map(p => "<p>" + esc(p) + "</p>").join("");
  $("currently-list").innerHTML = (SITE.about?.currently || [])
    .map(c => "<li>" + esc(c) + "</li>").join("");

  /* --- 200 experience --- */
  $("xp-list").innerHTML = (SITE.experience || []).map(x =>
    '<article class="xp-item reveal">' +
      '<div class="mono xp-meta">' + esc(x.dates) + "<br>" + esc(x.where) + "</div>" +
      "<div>" +
        '<h3 class="xp-role">' + esc(x.role) + "</h3>" +
        '<p class="xp-org">' + esc(x.org) + "</p>" +
        '<ul class="xp-bullets">' + (x.bullets || []).map(b => "<li>" + esc(b) + "</li>").join("") + "</ul>" +
      "</div>" +
    "</article>"
  ).join("");

  $("edu-list").innerHTML = (SITE.education || []).map(e =>
    '<article class="xp-item reveal">' +
      '<div class="mono xp-meta">' + esc(e.dates) + "</div>" +
      "<div>" +
        '<h3 class="xp-role">' + esc(e.school) + "</h3>" +
        '<p class="xp-org">' + esc(e.degree) + "</p>" +
        '<ul class="xp-bullets"><li>' + esc(e.detail) + "</li></ul>" +
      "</div>" +
    "</article>"
  ).join("");

  $("skills-line").innerHTML = SITE.skills
    ? "<strong>Toolkit —</strong> " + esc(SITE.skills)
    : "";

  /* --- 300 work --- */
  const workGrid = $("work-grid");
  (SITE.work || []).forEach(w => {
    const card = document.createElement("article");
    card.className = "card reveal";
    const media = document.createElement("div");
    media.className = "card-media";
    imgSlot(w.image, w.title, media);
    card.appendChild(media);
    const body = document.createElement("div");
    body.className = "card-body";
    body.innerHTML =
      '<div class="card-tags">' + (w.tags || []).map(t => '<span class="tag">' + esc(t) + "</span>").join("") + "</div>" +
      '<h3 class="card-title">' + esc(w.title) + "</h3>" +
      '<p class="card-blurb">' + esc(w.blurb) + "</p>" +
      (w.link ? '<a class="card-link" href="' + esc(w.link) + '" target="_blank" rel="noopener">' + esc(w.linkLabel || "View") + " →</a>" : "");
    card.appendChild(body);
    workGrid.appendChild(card);
  });

  /* --- 400 gallery --- */
  const gGrid = $("gallery-grid");
  (SITE.gallery || []).forEach(g => {
    const fig = document.createElement("figure");
    fig.className = "shot reveal";
    const media = document.createElement("div");
    media.className = "shot-media";
    imgSlot(g.image, g.caption, media);
    fig.appendChild(media);
    const cap = document.createElement("figcaption");
    cap.className = "mono shot-caption";
    cap.textContent = g.caption || "";
    fig.appendChild(cap);
    gGrid.appendChild(fig);
  });

  /* --- 500 off the clock --- */
  $("otc-heading").textContent = SITE.offTheClock?.heading || "";
  $("otc-paragraphs").innerHTML = (SITE.offTheClock?.paragraphs || [])
    .map(p => "<p>" + esc(p) + "</p>").join("");
  $("otc-facts").innerHTML = (SITE.offTheClock?.facts || []).map(f =>
    '<div class="otc-fact"><div class="stat-value">' + esc(f.value) +
    '</div><div class="stat-label">' + esc(f.label) + "</div></div>"
  ).join("");

  /* --- 600 contact --- */
  $("contact-heading").innerHTML = SITE.email
    ? '<a href="mailto:' + esc(SITE.email) + '">' + esc(SITE.contact?.heading || "Let's talk.") + "</a>"
    : esc(SITE.contact?.heading || "Let's talk.");
  $("contact-line").textContent = SITE.contact?.line || "";
  const cActions = [];
  if (SITE.email) cActions.push('<a class="btn btn-primary" href="mailto:' + esc(SITE.email) + '">' + esc(SITE.email) + "</a>");
  (SITE.links || []).forEach(l => {
    if (l.url) cActions.push('<a class="btn btn-ghost" href="' + esc(l.url) + '" target="_blank" rel="noopener">' + esc(l.label) + " ↗</a>");
  });
  $("contact-actions").innerHTML = cActions.join("");

  /* --- footer --- */
  const fullName = [SITE.firstName, SITE.lastName].filter(Boolean).join(" ");
  $("footer-left").textContent = "© " + new Date().getFullYear() + " " + fullName + " · Built by hand, audited twice.";
  $("footer-right").textContent = SITE.footerNote || "";

  /* --- hide empty sections --- */
  const hideIfEmpty = (arr, sectionId) => {
    if (!arr || arr.length === 0) document.getElementById(sectionId).style.display = "none";
  };
  hideIfEmpty(SITE.work, "work");
  hideIfEmpty(SITE.gallery, "gallery");
  hideIfEmpty(SITE.experience, "experience");
  if (!SITE.offTheClock || !SITE.offTheClock.heading) $("offtheclock").style.display = "none";

  /* --- nav border on scroll --- */
  const nav = $("nav");
  addEventListener("scroll", () => nav.classList.toggle("scrolled", scrollY > 8), { passive:true });

  /* --- scroll reveals --- */
  if (prefersReduced || !("IntersectionObserver" in window)){
    document.querySelectorAll(".reveal").forEach(el => el.classList.add("in"));
  } else {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold:.12 });
    document.querySelectorAll(".reveal").forEach(el => io.observe(el));
  }
})();
</script>
</body>
</html>
