  border-top:1px solid var(--line);
  padding:26px 0 44px;
  display:flex; flex-wrap:wrap; gap:10px 24px;
  justify-content:space-between;
  color:var(--ink-2);
  font-size:14px;
}
.footer a{ color:inherit; text-decoration:none; }
.footer a:hover{ color:var(--accent); }

/* ---------- photo placeholder (shows until you add real photos) ---------- */
.ph{
  width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:8px;
  background:var(--surface);
  border:1px dashed var(--line);
  color:var(--ink-2);
  text-align:center;
  padding:18px;
}
.ph-name{ font-family:var(--font-mono); font-size:12.5px; color:var(--ink); }
.ph-hint{ font-size:12.5px; max-width:24ch; }

/* ---------- scroll reveals ---------- */
.reveal{ opacity:1; transform:none; }
@media (prefers-reduced-motion: no-preference){
  .reveal{
    opacity:0; transform:translateY(14px);
    transition:opacity .6s cubic-bezier(.16,1,.3,1), transform .6s cubic-bezier(.16,1,.3,1);
    transition-delay:var(--d, 0s);
  }
  .reveal.in{ opacity:1; transform:none; }
}
</style>
</head>

<body id="top">
<a class="skip-link" href="#main">Skip to content</a>
<div id="nav-sentinel" aria-hidden="true"></div>

<header class="nav" id="nav">
  <div class="wrap nav-inner">
    <a class="wordmark" href="#top" id="wordmark"></a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#work">Work</a></li>
    </ul>
    <a class="btn btn-primary btn-small" id="nav-cta" href="#contact">Get in touch</a>
  </div>
</header>

<main id="main">

  <!-- HERO -->
  <section class="hero wrap">
    <div class="hero-grid">
      <div>
        <h1 class="hero-name rise" id="hero-name"></h1>
        <p class="hero-tagline rise" id="hero-tagline"></p>
        <div class="hero-actions rise" id="hero-actions"></div>
      </div>
      <figure class="hero-portrait" id="hero-portrait"></figure>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="section wrap" id="about">
    <h2 class="section-title reveal">About</h2>
    <div class="about-body">
      <div id="about-paragraphs"></div>
      <div class="currently reveal" id="currently">
        <h3>Currently</h3>
        <ul id="currently-list"></ul>
      </div>
    </div>
  </section>

  <!-- EXPERIENCE -->
  <section class="section wrap" id="experience">
    <h2 class="section-title reveal">Experience</h2>
    <div class="xp" id="xp-list"></div>
    <h3 class="xp-sub reveal" id="edu-heading">Education</h3>
    <div class="xp" id="edu-list"></div>
    <h3 class="xp-sub reveal" id="skills-heading">Toolkit</h3>
    <div class="skills-row" id="skills-row"></div>
  </section>

  <!-- SELECTED WORK -->
  <section class="section wrap" id="work">
    <h2 class="section-title reveal">Selected work</h2>
    <div class="work-grid" id="work-grid"></div>
  </section>

  <!-- OFF THE CLOCK -->
  <section class="beyond" id="beyond">
    <div class="wrap">
      <h2 class="section-title reveal" id="beyond-heading"></h2>
      <div class="beyond-body reveal" id="beyond-paragraphs"></div>
      <div class="beyond-facts" id="beyond-facts"></div>
      <figure class="beyond-photo reveal" id="beyond-photo"></figure>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section wrap" id="contact">
    <div class="reveal">
      <h2 class="contact-heading" id="contact-heading"></h2>
      <p class="contact-line" id="contact-line"></p>
      <a class="contact-email" id="contact-email" href="#"></a>
      <ul class="contact-links" id="contact-links"></ul>
    </div>
  </section>

  <footer class="footer wrap">
    <span id="footer-left"></span>
    <a href="#top">Back to top</a>
  </footer>

</main>

<script>
/* ============================================================
   RENDERING. You should not need to edit below this line.
   ============================================================ */
(function(){
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
  const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const fullName = [SITE.firstName, SITE.lastName].filter(Boolean).join(" ");

  /* --- image slots with labeled placeholders --- */
  function imgSlot(src, alt, container){
    const expected = src || "images/photo.jpg";
    if (!src){ container.appendChild(placeholder(expected)); return; }
    const img = document.createElement("img");
    img.src = src;
    img.alt = alt || "";
    img.loading = "lazy";
    img.addEventListener("error", () => { img.replaceWith(placeholder(src)); });
    container.appendChild(img);
  }
  function placeholder(path){
    const div = document.createElement("div");
    div.className = "ph";
    div.innerHTML =
      '<span class="ph-name">' + esc(path.split("/").pop()) + '</span>' +
      '<span class="ph-hint">Upload this photo to the images folder</span>';
    return div;
  }

  /* --- head, nav, hero --- */
  document.title = fullName + " | " + "Accounting & Information Systems at UW Foster";
  $("wordmark").textContent = fullName;

  $("hero-name").innerHTML = esc(SITE.firstName) +
    (SITE.lastName ? "<br>" + esc(SITE.lastName) : "");
  $("hero-tagline").textContent = SITE.tagline || "";

  const actions = [];
  if (SITE.email) actions.push('<a class="btn btn-primary" href="mailto:' + esc(SITE.email) + '">Get in touch</a>');
  if (SITE.resumeFile) actions.push('<a class="btn btn-ghost" href="' + esc(SITE.resumeFile) + '" download>Download resume</a>');
  $("hero-actions").innerHTML = actions.join("");
  if (SITE.email) $("nav-cta").href = "mailto:" + SITE.email;

  const portraitFrame = document.createElement("div");
  portraitFrame.className = "frame";
  imgSlot(SITE.photo, SITE.photoAlt, portraitFrame);
  $("hero-portrait").appendChild(portraitFrame);

  /* --- about --- */
  $("about-paragraphs").innerHTML = (SITE.about?.paragraphs || [])
    .map((p, i) => '<p class="reveal' + (i === 0 ? " lede" : "") + '">' + esc(p) + "</p>").join("");
  $("currently-list").innerHTML = (SITE.about?.currently || [])
    .map(c => "<li>" + esc(c) + "</li>").join("");
  if (!SITE.about?.currently?.length) $("currently").style.display = "none";
  if (!SITE.about?.paragraphs?.length) $("about").style.display = "none";

  /* --- experience --- */
  $("xp-list").innerHTML = (SITE.experience || []).map(x =>
    '<article class="xp-item reveal">' +
      '<div class="xp-meta">' + esc(x.dates) + "<br>" + esc(x.where) + "</div>" +
      "<div>" +
        '<h3 class="xp-role">' + esc(x.role) + "</h3>" +
        '<p class="xp-org">' + esc(x.org) + "</p>" +
        '<ul class="xp-bullets">' + (x.bullets || []).map(b => "<li>" + esc(b) + "</li>").join("") + "</ul>" +
      "</div>" +
    "</article>"
  ).join("");

  $("edu-list").innerHTML = (SITE.education || []).map(e =>
    '<article class="xp-item reveal">' +
      '<div class="xp-meta">' + esc(e.dates) + "</div>" +
      "<div>" +
        '<h3 class="xp-role">' + esc(e.school) + "</h3>" +
        '<p class="xp-org">' + esc(e.degree) + "</p>" +
        '<ul class="xp-bullets">' + (e.notes || []).map(n => "<li>" + esc(n) + "</li>").join("") + "</ul>" +
      "</div>" +
    "</article>"
  ).join("");
  if (!SITE.education?.length){ $("edu-heading").style.display = "none"; }

  $("skills-row").innerHTML = (SITE.skills || [])
    .map(s => '<span class="skill">' + esc(s) + "</span>").join("");
  if (!SITE.skills?.length){ $("skills-heading").style.display = "none"; }
  if (!SITE.experience?.length && !SITE.education?.length && !SITE.skills?.length){
    $("experience").style.display = "none";
  }

  /* --- selected work: first item featured, the rest alternate styles --- */
  const workGrid = $("work-grid");
  (SITE.work || []).forEach((w, i) => {
    const cell = document.createElement("article");
    cell.className = "work-cell reveal " +
      (i === 0 ? "featured" : (i % 2 === 1 ? "solid" : "lined"));
    cell.style.setProperty("--d", (Math.min(i, 4) * 0.05) + "s");
    if (w.image){
      const media = document.createElement("div");
      media.className = "work-media";
      imgSlot(w.image, w.title, media);
      cell.appendChild(media);
    }
    const body = document.createElement("div");
    body.style.display = "flex";
    body.style.flexDirection = "column";
    body.style.flex = "1";
    body.innerHTML =
      (w.year || (w.tags && w.tags.length)
        ? '<div class="work-meta">' + esc([w.year, (w.tags || []).join(", ")].filter(Boolean).join(" / ")) + "</div>"
        : "") +
      '<h3 class="work-title">' + esc(w.title) + "</h3>" +
      '<p class="work-blurb">' + esc(w.blurb) + "</p>" +
      (w.link
        ? '<a class="work-link" href="' + esc(w.link) + '" target="_blank" rel="noopener">' +
            esc(w.linkLabel || "View") + ' <span class="arrow">&#8599;</span></a>'
        : "");
    cell.appendChild(body);
    workGrid.appendChild(cell);
  });
  if (!SITE.work?.length) $("work").style.display = "none";

  /* --- off the clock --- */
  if (SITE.beyond?.heading){
    $("beyond-heading").textContent = SITE.beyond.heading;
    $("beyond-paragraphs").innerHTML = (SITE.beyond.paragraphs || [])
      .map(p => "<p>" + esc(p) + "</p>").join("");
    $("beyond-facts").innerHTML = (SITE.beyond.facts || []).map((f, i) =>
      '<div class="reveal" style="--d:' + (i * 0.06) + 's">' +
        '<div class="stat-value">' + esc(f.value) + "</div>" +
        '<div class="stat-label">' + esc(f.label) + "</div>" +
      "</div>"
    ).join("");
    if (!SITE.beyond.facts?.length) $("beyond-facts").style.display = "none";
    imgSlot(SITE.beyond.photo, SITE.beyond.photoAlt, $("beyond-photo"));
  } else {
    $("beyond").style.display = "none";
  }

  /* --- contact --- */
  $("contact-heading").textContent = SITE.contact?.heading || "Let's talk.";
  $("contact-line").textContent = SITE.contact?.line || "";
  if (SITE.email){
    $("contact-email").textContent = SITE.email;
    $("contact-email").href = "mailto:" + SITE.email;
  } else {
    $("contact-email").style.display = "none";
  }
  $("contact-links").innerHTML = (SITE.links || [])
    .filter(l => l.url)
    .map(l => '<li><a href="' + esc(l.url) + '" target="_blank" rel="noopener">' +
      esc(l.label) + ' <span aria-hidden="true">&#8599;</span></a></li>').join("");

  /* --- footer --- */
  $("footer-left").textContent = "© " + new Date().getFullYear() + " " + fullName;

  /* --- structured data for search engines --- */
  const ld = {
    "@context": "https://schema.org",
    "@type": "Person",
    name: fullName,
    email: SITE.email ? "mailto:" + SITE.email : undefined,
    affiliation: "University of Washington, Foster School of Business",
    sameAs: (SITE.links || []).filter(l => l.url).map(l => l.url),
  };
  const ldTag = document.createElement("script");
  ldTag.type = "application/ld+json";
  ldTag.textContent = JSON.stringify(ld);
  document.head.appendChild(ldTag);

  /* --- nav border once the page scrolls (IntersectionObserver, no scroll listener) --- */
  const nav = $("nav");
  new IntersectionObserver(([entry]) => {
    nav.classList.toggle("scrolled", !entry.isIntersecting);
  }).observe($("nav-sentinel"));

  /* --- scroll reveals + stat count-up trigger --- */
  const reveals = document.querySelectorAll(".reveal");
  if (prefersReduced || !("IntersectionObserver" in window)){
    reveals.forEach(el => el.classList.add("in"));
  } else {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        e.target.classList.add("in");
        io.unobserve(e.target);
      });
    }, { threshold: .15 });
    reveals.forEach(el => io.observe(el));
  }
})();
</script>
</body>
</html>
